<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arcade Interface</title>
    <style>
        body { background: #313338; color: #fff; font-family: sans-serif; padding: 25px; margin: 0; }
        h2 { margin-bottom: 20px; font-weight: 600; letter-spacing: 0.5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: #2b2d31; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #1e1f22; transition: 0.2s; cursor: pointer; }
        .card:hover { transform: translateY(-4px); border-color: #5865f2; background: #35373c; }
        .icon-box { width: 70px; height: 70px; background: #1e1f22; border-radius: 16px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #f2f3f5; }
        .play-btn { background: #248046; color: white; border: none; padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .play-btn:hover { background: #1a6535; }
    </style>
</head>
<body>

    <h2>🕹️ RETRO SYSTEM ARCADE</h2>
    <div class="grid" id="game-grid"></div>

    <script>
        // Use raw.githack.com to turn raw GitHub script files into runnable code inside the page!
        const games = [
            { title: "1942 Arcade", icon: "✈️", url: "https://raw.githack.com/CalcSolver/Wii/main/1942.html" },
            { title: "Pac-Man Classic", icon: "🕹️", url: "https://raw.githack.com/CalcSolver/Wii/main/pacman.html" }
        ];

        const grid = document.getElementById('game-grid');
        games.forEach(game => {
            const el = document.createElement('div');
            el.className = 'card';
            el.onclick = () => window.open(game.url, '_blank');
            el.innerHTML = `
                <div class="icon-box">${game.icon}</div>
                <div class="title">${game.title}</div>
                <button class="play-btn">LAUNCH</button>
            `;
            grid.appendChild(el);
        });
    </script>
</body>
</html>
